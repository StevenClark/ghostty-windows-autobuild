name: ghostty-win-build
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: windows-latest
    steps:
      - name: fetch-upstream-sha
        id: upstream
        shell: pwsh
        run: |
          $sha = git ls-remote https://github.com/ghostty-org/ghostty.git HEAD | ForEach-Object { $_.Split("`t")[0] }
          $shortSha = $sha.Substring(0, 7)
          $date = Get-Date -Format "yyyy-MM-dd"
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          echo "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          echo "date=$date" >> $env:GITHUB_OUTPUT

      - name: check-cache
        id: cache-marker
        uses: actions/cache@v4
        with:
          path: last_built_sha.txt
          key: ghostty-build-${{ steps.upstream.outputs.sha }}

      - name: checkout-source
        if: steps.cache-marker.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          fetch-depth: 1

      - name: setup-msys2
        if: steps.cache-marker.outputs.cache-hit != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-blueprint-compiler
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-pkgconf

      - name: setup-zig-auto
        if: steps.cache-marker.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: '' 

      - name: build-release
        if: steps.cache-marker.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $msysPrefix = Join-Path $env:RUNNER_TEMP "msys64\ucrt64"
          $msysBin = Join-Path $msysPrefix "bin"
          $shimDir = Join-Path $env:RUNNER_TEMP "ghostty-shims"
          New-Item -ItemType Directory -Force $shimDir | Out-Null
          $env:PATH = "$shimDir;$msysBin;$env:PATH"
          $env:PYTHONUTF8 = "1"
          $env:PYTHONIOENCODING = "utf-8"

          $blueprintScript = Join-Path $msysBin "blueprint-compiler"
          $blueprintShim = Join-Path $shimDir "blueprint-compiler.cmd"
          @"
          @echo off
          set PYTHONUTF8=1
          set PYTHONIOENCODING=utf-8
          "$msysBin\python.exe" "$blueprintScript" %*
          "@ | Set-Content -Encoding ascii $blueprintShim

          Get-ChildItem $msysBin -Filter "*blueprint*" | Select-Object FullName
          Get-Command blueprint-compiler -All
          blueprint-compiler --version
          blueprint-compiler compile --output "$env:RUNNER_TEMP\debug-warning.ui" "src\apprt\gtk\ui\1.2\debug-warning.blp"

          $gresourcePath = "src\apprt\gtk\build\gresource.zig"
          $gresource = Get-Content -Raw $gresourcePath
          $gresource = $gresource.Replace(
            'if (!std.mem.endsWith(u8, ui_file, expected)) continue;',
            'const normalized = try std.mem.replaceOwned(u8, alloc, ui_file, "\\", "/"); defer alloc.free(normalized); if (!std.mem.endsWith(u8, normalized, expected)) continue;'
          )
          $gresource = $gresource.Replace(
            '    try stdout.end();',
            '    try writer.flush();'
          )
          $gresource = $gresource.Replace(
            '    <file compressed=\"true\" preprocess=\"xml-stripblanks\" alias=\"{d}.{d}/{s}.ui\">{s}</file>\n',
            '    <file compressed=\"true\" alias=\"{d}.{d}/{s}.ui\">{s}</file>\n'
          )
          Set-Content -Encoding utf8 $gresourcePath $gresource

          $applicationPath = "src\apprt\gtk\class\application.zig"
          $application = Get-Content -Raw $applicationPath
          $application = $application.Replace(
            '    fn startupSignals(self: *Self) void {' + "`n" + '        const priv = self.private();',
            '    fn startupSignals(self: *Self) void {' + "`n" + '        if (comptime @import("builtin").os.tag == .windows) {' + "`n" + '            _ = self;' + "`n" + '            return;' + "`n" + '        }' + "`n`n" + '        const priv = self.private();'
          )
          Set-Content -Encoding utf8 $applicationPath $application

          $postForkPath = "src\apprt\gtk\post_fork.zig"
          $postFork = Get-Content -Raw $postForkPath
          $postFork = $postFork.Replace(
            'pub fn postFork(cmd: *Command) Command.PostForkError!void {' + "`n" + '    switch (cmd.rt_post_fork_info.linux_cgroup) {',
            'pub fn postFork(cmd: *Command) Command.PostForkError!void {' + "`n" + '    if (comptime @import("builtin").os.tag == .windows) {' + "`n" + '        _ = cmd;' + "`n" + '        return;' + "`n" + '    }' + "`n`n" + '    switch (cmd.rt_post_fork_info.linux_cgroup) {'
          )
          Set-Content -Encoding utf8 $postForkPath $postFork

          Remove-Item -Recurse -Force ".zig-cache" -ErrorAction SilentlyContinue
          Get-ChildItem (Join-Path $msysPrefix "lib\lib*.dll.a") | ForEach-Object {
            $alias = $_.FullName -replace '\.dll\.a$', '.a'
            if (!(Test-Path $alias)) {
              Copy-Item $_.FullName $alias
            }
          }
          $zigArgs = @(
            "build",
            "--search-prefix", "$msysPrefix",
            "-Dtarget=x86_64-windows-gnu",
            "-Doptimize=ReleaseFast",
            "-Dapp-runtime=gtk"
          )
          zig @zigArgs

      - name: verify-release-file
        if: steps.cache-marker.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (!(Test-Path "zig-out/bin/ghostty.exe")) {
            Get-ChildItem -Recurse zig-out -ErrorAction SilentlyContinue
            throw "Expected release file was not built: zig-out/bin/ghostty.exe"
          }

      - name: update-cache-file
        if: steps.cache-marker.outputs.cache-hit != 'true'
        run: echo "${{ steps.upstream.outputs.sha }}" > last_built_sha.txt

      - name: create-release
        if: steps.cache-marker.outputs.cache-hit != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.upstream.outputs.date }}-${{ steps.upstream.outputs.short_sha }}
          name: Ghostty Windows Build (${{ steps.upstream.outputs.date }})
          body: |
            Automated build of Ghostty for Windows.
            Upstream Commit: https://github.com/ghostty-org/ghostty/commit/${{ steps.upstream.outputs.sha }}
          files: zig-out/bin/ghostty.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
